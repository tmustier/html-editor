<!doctype html>
<html>
<head><title>svg labelled</title></head>
<body>
<h1>Diagram with labelled groups</h1>
<div class="diagram">
  <svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
    <g>
      <rect x="20" y="20" width="160" height="80" fill="#e6f0ff" stroke="#3366cc"/>
      <text x="100" y="55" text-anchor="middle" font-family="sans-serif" font-size="14">First box</text>
      <text x="100" y="75" text-anchor="middle" font-family="sans-serif" font-size="11">subtitle</text>
    </g>
    <g>
      <rect x="220" y="20" width="160" height="80" fill="#fef0e6" stroke="#cc6633"/>
      <text x="300" y="55" text-anchor="middle" font-family="sans-serif" font-size="14">Second box</text>
    </g>
    <g>
      <rect x="420" y="20" width="160" height="80" fill="#e6ffe6" stroke="#33cc33"/>
      <text x="500" y="55" text-anchor="middle" font-family="sans-serif" font-size="14">Third box</text>
    </g>
  </svg>
</div>
</body>
</html>
