<!doctype html>
<html>
<head><title>svg mixed tspans</title></head>
<body>
<h1>SVG with every tspan shape</h1>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="240" viewBox="0 0 600 240">

  <!-- shape A: plain text, no tspan -->
  <g>
    <rect x="20" y="20" width="200" height="40" fill="#e6f0ff" stroke="#3366cc"/>
    <text x="120" y="45" text-anchor="middle" font-family="sans-serif" font-size="14">plain text only</text>
  </g>

  <!-- shape B: single tspan wrap -->
  <g>
    <rect x="240" y="20" width="200" height="40" fill="#fef0e6" stroke="#cc6633"/>
    <text x="340" y="45" text-anchor="middle" font-family="sans-serif" font-size="14"><tspan font-family="monospace">single-wrap-mono</tspan></text>
  </g>

  <!-- shape C: text + tspan + text -->
  <g>
    <rect x="20" y="80" width="420" height="40" fill="#e6ffe6" stroke="#33cc33"/>
    <text x="230" y="105" text-anchor="middle" font-family="sans-serif" font-size="14">node · reads <tspan font-family="monospace">runner.env</tspan> / Keychain</text>
  </g>

  <!-- shape D: tspan + text + tspan -->
  <g>
    <rect x="20" y="140" width="420" height="40" fill="#fff5e6" stroke="#cc9933"/>
    <text x="230" y="165" text-anchor="middle" font-family="sans-serif" font-size="14"><tspan font-weight="bold">bold</tspan> middle <tspan font-style="italic">italic</tspan></text>
  </g>

</svg>
</body>
</html>
